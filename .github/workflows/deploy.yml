name: Deploy to Vercel (production)

# Every push to main runs the Playwright E2E suite; only if it passes does the
# production deploy run. The deploy itself builds on Vercel's infrastructure
# using the project's configured env vars + vercel.json.
on:
  push:
    branches: [main]

# Never run two production deploys at once; newer pushes supersede older ones.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/scout_e2e
      # E2E never calls the LLM / web search; placeholders satisfy any env reads
      # at module load so the server boots.
      OPENAI_API_KEY: test-openai-key
      TAVILY_API_KEY: test-tavily-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to production
    needs: e2e
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to production
        run: vercel deploy --prod --yes
